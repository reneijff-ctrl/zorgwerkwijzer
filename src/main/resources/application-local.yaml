spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/zorgwerkwijzer
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@zorgwerkwijzer.nl}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:3001
    allow-credentials: true
  jwt:
    # Local test secret - 512 bits (64 bytes Base64-encoded)
    # DO NOT use in production. Generate with: openssl rand -base64 64
    secret: S2F6QThpdWdCMzdxcGl4dGhVYkgzU0hhdlRlS09aZ3FVeGF2ajhtQ2lGVzlKbXloRENVYlZDb0M1dHJqRGJrblY2QUJ6dWp6RFFJU0JrZU9NZmJnPT0=
    expiration: 900000
    refresh-expiration: 604800000
    issuer: zorgwerkwijzer.nl
  supabase:
    url: ${SUPABASE_URL:}
    key: ${SUPABASE_SERVICE_KEY:}
    bucket: cv-files
  mail:
    from: ${MAIL_FROM:noreply@zorgwerkwijzer.nl}
    admin: ${MAIL_ADMIN:admin@zorgwerkwijzer.nl}
  stripe:
    # Lokale Stripe CLI webhook signing secret.
    # Genereer met: stripe listen --forward-to http://localhost:8080/api/v1/stripe/webhook
    # De CLI toont een whsec_... waarde — vul die hier in.
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
