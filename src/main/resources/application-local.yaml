spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/zorgwerkwijzer
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@zorgwerkwijzer.nl}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  frontend:
    url: http://localhost:3000
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:3001
    allow-credentials: true
  jwt:
    # Local test secret - 512 bits (64 bytes Base64-encoded)
    # DO NOT use in production. Generate with: openssl rand -base64 64
    secret: S2F6QThpdWdCMzdxcGl4dGhVYkgzU0hhdlRlS09aZ3FVeGF2ajhtQ2lGVzlKbXloRENVYlZDb0M1dHJqRGJrblY2QUJ6dWp6RFFJU0JrZU9NZmJnPT0=
    expiration: 900000
    refresh-expiration: 604800000
    issuer: zorgwerkwijzer.nl
  supabase:
    url: ${SUPABASE_URL:}
    key: ${SUPABASE_SERVICE_KEY:}
    bucket: cv-files
  mail:
    from: ${MAIL_FROM:noreply@zorgwerkwijzer.nl}
    admin: ${MAIL_ADMIN:admin@zorgwerkwijzer.nl}
  stripe:
    # ⚠️  VEREIST voor lokale webhook-verwerking (credits, abonnementen).
    #
    # Stap 1: installeer de Stripe CLI (https://stripe.com/docs/stripe-cli)
    # Stap 2: log in:  stripe login
    # Stap 3: start forwarding:
    #   stripe listen --forward-to http://localhost:8080/api/v1/stripe/webhook
    # Stap 4: kopieer het getoonde whsec_... geheim en vul het hieronder in:
    #
    # Zonder dit secret worden ALLE webhooks genegeerd — credits worden NIET
    # toegevoegd na een betaling.
    # ⚠️  BELANGRIJK: dit secret is sessie-gebonden en verandert bij elke nieuwe `stripe listen`.
    # Kopieer het whsec_... dat de Stripe CLI toont en vervang de waarde hieronder.
    # Voorbeeld uitvoer CLI: > Ready! Your webhook signing secret is whsec_abc123...
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_fc3b2d943a49cd79bdfb08c20577501b40a9f8fbe35b78d0512f64cf257901a9}

# OpenAI configuratie voor AI Nieuwsredactie
# Stel OPENAI_API_KEY in als environment variable, of vul de key hieronder in als fallback.
# Verkrijg een API key via: https://platform.openai.com/api-keys
openai:
  api-key: ${OPENAI_API_KEY:}
