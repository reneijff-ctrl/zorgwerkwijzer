spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://db:5432/zorgwerkwijzer}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
